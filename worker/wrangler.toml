# Cloudflare Worker: serves the built frontend (../dist) and the /api/* RPC.
# Local dev:  npm run build && npx wrangler dev          (from worker/)
# Deploy:     npx wrangler deploy
# D1 local:   npx wrangler d1 migrations apply finanzas --local

name = "finanzas"
main = "build/worker/shim.mjs"
compatibility_date = "2026-06-01"
# the app lives only at the canonical URL; no per-version preview URLs
preview_urls = false
workers_dev = true

[build]
# worker-build lives in ~/.cargo/bin (cargo install worker-build), which the
# user's fish PATH has but wrangler's /bin/sh may not.
command = "PATH=\"$HOME/.cargo/bin:$PATH\" worker-build --release"

[assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "finanzas"
database_id = "989837f1-f89f-4518-983e-616b08da9c02"
migrations_dir = "migrations"

[triggers]
# Daily market-data refresh. Cron is UTC: 07:00 UTC ≈ 01:00 Mexico City.
crons = ["0 7 * * *"]

[vars]
# Secrets (GOOGLE_CLIENT_SECRET) via `wrangler secret put`. Registration is open
# (no invite code) but capped at MAX_USERS so the free-plan D1 database (500 MB)
# can never fill up. Raise this as real usage is observed; 0/unset = no cap.
MAX_USERS = "500"
PBKDF2_ITERATIONS = "100000"
# Google OAuth client id (not secret; appears in the consent URL). Set to the
# real id before deploy: the Client ID from Google Cloud → Credentials.
GOOGLE_CLIENT_ID = "736484669055-ub19ovg5t6ccrmbjd5vlpi65pu0j8stn.apps.googleusercontent.com"
